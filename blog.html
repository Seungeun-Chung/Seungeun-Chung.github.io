<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Seungeun Chung</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    section {
      height: auto;
      min-height: 0;
      overflow: visible;
      padding: 20px 0 60px;
      justify-content: flex-start;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Seungeun Chung</a>
      <ul class="nav-links">
        <li><a href="index.html#about">소개</a></li>
        <li><a href="index.html#resume">이력</a></li>
        <li><a href="index.html#publications">논문</a></li>
        <li><a href="index.html#projects">프로젝트</a></li>
        <li><a href="index.html#certifications">수상</a></li>
        <li><a href="blog.html" class="active">블로그</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section style="padding-top: 20px;">
      <h2 class="section-title">블로그</h2>
      <div id="post-list" class="post-list">
        <p class="loading">포스트를 불러오는 중...</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Seungeun Chung · Built with HTML & ❤️</p>
  </footer>

  <script>
    async function loadPosts() {
      const container = document.getElementById('post-list');
      try {
        const res = await fetch('posts/index.json');
        if (!res.ok) throw new Error('fetch failed');
        const posts = await res.json();

        if (posts.length === 0) {
          container.innerHTML = '<div class="empty-state">아직 작성된 포스트가 없습니다.</div>';
          return;
        }

        container.innerHTML = posts
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .map(post => `
            <div class="post-item" onclick="location.href='post.html?file=${post.file}'">
              <div>
                <h3>${post.title}</h3>
                <p>${post.description || ''}</p>
                <div class="tags">
                  ${(post.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
              </div>
              <div class="post-meta">
                <div>${post.date}</div>
              </div>
            </div>
          `).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">포스트를 불러올 수 없습니다.</div>';
      }
    }

    loadPosts();
  </script>

</body>
</html>
